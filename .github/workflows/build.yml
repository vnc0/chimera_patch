name: Build and Patch Chimera IPA

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build-and-patch:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ldid

      - name: Build chimera4k.dylib
        run: make all

      - name: Download Chimera IPAs
        run: |
          curl --fail -L -o chimera-1.6.5-12.2-12.5.ipa \
            "https://github.com/coolstar/electra-ipas/raw/master/chimera/1.6.5-12.2-12.5.ipa"
          curl --fail -L -o chimera-1.6.5-12.0-12.5.ipa \
            "https://github.com/coolstar/electra-ipas/raw/master/chimera/1.6.5-12.0-12.5.ipa"

      - name: Patch IPAs
        run: |
          chmod +x patch_ipa.sh
          ./patch_ipa.sh chimera-1.6.5-12.2-12.5.ipa chimera-1.6.5-12.2-12.5-patched.ipa
          ./patch_ipa.sh chimera-1.6.5-12.0-12.5.ipa chimera-1.6.5-12.0-12.5-patched.ipa

      - name: Upload patched IPA (12.2-12.5)
        uses: actions/upload-artifact@v4
        with:
          name: chimera-1.6.5-12.2-12.5-patched
          path: chimera-1.6.5-12.2-12.5-patched.ipa

      - name: Upload patched IPA (12.0-12.5)
        uses: actions/upload-artifact@v4
        with:
          name: chimera-1.6.5-12.0-12.5-patched
          path: chimera-1.6.5-12.0-12.5-patched.ipa
